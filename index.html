<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal // Letter</title>
    <style>
        /* Monospace Terminal Styling */
        body {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 550px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* --- RESPONSIVE ASCII BORDERS --- */
        .ascii-container {
            border-top: 1.5px dashed #666666;    /* Mimics - */
            border-bottom: 1.5px dashed #666666; /* Mimics - */
            border-left: 1.5px solid #666666;    /* Mimics | */
            border-right: 1.5px solid #666666;   /* Mimics | */
            position: relative;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        /* ASCII Corners */
        .corner {
            position: absolute;
            background: #000000;
            color: #666666;
            font-size: 1.1rem;
            line-height: 1;
            padding: 0 4px;
        }
        
        /* Corner Positioning */
        .top-left { top: -9px; left: -6px; }
        .top-right { top: -9px; right: -6px; }
        .bottom-left { bottom: -9px; left: -6px; }
        .bottom-right { bottom: -9px; right: -6px; }

        /* Initial Header */
        .typing-header {
            font-size: 1.4rem;
            font-weight: 400;
            margin: 0;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid rgba(255, 255, 255, 0.75);
            width: 0;
            animation: 
                typing-css 1.5s steps(22, end) forwards,
                blink-cursor 0.75s step-end infinite;
        }

        /* Action Button */
        .btn-wrapper {
            margin: 10px 0 20px 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .btn-wrapper.show-btn {
            opacity: 1;
        }

        .btn {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }

        .btn:hover {
            color: #aaaaaa;
        }

        /* Loading / Processing Logs */
        .log-line {
            font-size: 0.95rem;
            color: #888888;
            margin-bottom: 15px;
            min-height: 1.2rem;
            display: none; /* Hidden until button click */
        }

        /* Triggers via JS after letter finishes */
        .success-text {
            color: #ffffff !important; 
            font-weight: bold; 
        }

        /* --- CUTE PAPER BORDER FOR THE LETTER --- */
        .letter-paper {
            display: none; /* Hidden until button click */
            border-top: 1.5px dashed #bbbbbb; 
            border-bottom: 1.5px dashed #bbbbbb;
            border-left: 1.5px solid #bbbbbb;
            border-right: 1.5px solid #bbbbbb;
            padding: 25px 20px;
        }

        /* Cute asterisk corners for the paper */
        .letter-paper .corner {
            color: #bbbbbb;
        }

        /* Letter Content Layout */
        .letter-box {
            width: 100%;
            line-height: 1.8;
            color: #dddddd; 
            font-size: 1.15rem; 
        }

        .letter-line {
            margin-bottom: 15px;
            min-height: 1.5rem; 
        }

        /* CSS Animations */
        @keyframes typing-css {
            from { width: 0 }
            to { width: 100% }
        }
