<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal // Letter</title>
    <style>
        /* Monospace Terminal Styling */
        body {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 550px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* Plaintext | borders */
        .border-line {
            color: #444444;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            margin: 8px 0;
            white-space: pre;
            overflow: hidden;
        }

        /* Initial Header */
        .typing-header {
            font-size: 1.4rem;
            font-weight: 400;
            margin: 10px 0;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid rgba(255, 255, 255, 0.75);
            width: 0;
            animation: 
                typing-css 1.5s steps(22, end) forwards,
                blink-cursor 0.75s step-end infinite;
        }

        /* Action Button */
        .btn-wrapper {
            margin: 15px 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .btn-wrapper.show-btn {
            opacity: 1;
        }

        .btn {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }

        .btn:hover {
            color: #aaaaaa;
        }

        /* Loading / Processing Logs */
        .log-line {
            font-size: 0.95rem;
            color: #888888;
            margin-top: 15px;
            min-height: 1.2rem;
        }

        #successLog {
            color: #ffffff; 
            font-weight: bold; 
            margin-top: 10px;
            margin-bottom: 20px;
        }

        /* Larger Font for the Letter Content */
        .letter-box {
            width: 100%;
            margin-top: 10px;
            line-height: 1.8;
            color: #dddddd; 
            font-size: 1.15rem; /* Noticeably larger for easy reading */
        }

        .letter-line {
            margin-bottom: 15px;
            min-height: 1.5rem; /* Prevents layout jumping while empty */
        }

        /* CSS Animations for the very first header */
        @keyframes typing-css {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-cursor {
            from, to { border-color: transparent }
            50% { border-color: rgba(255, 255, 255, 0.75); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .typing-header { font-size: 1.1rem; }
            .letter-box { font-size: 1.05rem; }
            .border-line { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="border-line">||||||||||||||||||||||||||||||||||||||||||||||||||||||</div>

        <div>
            <h1 id="greeting" class="typing-header">> Happy Birthday! ✨</h1>
        </div>

        <div class="border-line">||||||||||||||||||||||||||||||||||||||||||||||||||||||</div>
        
        <div id="btnWrapper" class="btn-wrapper">
            <button id="actionBtn" class="btn">[ Run execution_sequence.sh ]</button>
        </div>

        <div id="renderingLog" class="log-line"></div>
        <div id="successLog" class="log-line"></div>

        <div id="letterBox" class="letter-box"></div>
    </div>

    <script>
        const greeting = document.getElementById('greeting');
        const btnWrapper = document.getElementById('btnWrapper');
        const actionBtn = document.getElementById('actionBtn');
        const renderingLog = document.getElementById('renderingLog');
        const successLog = document.getElementById('successLog');
        const letterBox = document.getElementById('letterBox');

        // This is your actual letter content. 
        // Add as many strings to this list as you need. Leave an empty string "" for a blank line.
        const letterContent = [
            "Dear [Name],",
            "Write your heartfelt birthday message right here.",
            "Because this file lives in your private repository, you can make this letter as personal or secret as you want!",
            "Wishing you the absolute best day ever.",
            "",
            "Best,",
            "[Your Name]"
        ];

        // Helper function to type text out letter-by-letter
        async function typeText(element, text, speed = 40) {
            for (let i = 0; i < text.length; i++) {
                element.innerHTML += text.charAt(i);
                // Pause execution for 'speed' milliseconds
                await new Promise(resolve => setTimeout(resolve, speed));
            }
        }

        // Show the button after the initial CSS header finishes typing
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                btnWrapper.classList.add('show-btn');
                greeting.style.borderRight = "none"; // Remove cursor from header
            }, 1600);
        });

        // The main sequence that runs when the button is clicked
        actionBtn.addEventListener('click', async () => {
            // 1. Hide the button
            btnWrapper.style.display = 'none';
            
            // 2. Type the rendering message
            await typeText(renderingLog, "> Rendering a heartfelt message...", 40);
            
            // Pause for dramatic effect
            await new Promise(resolve => setTimeout(resolve, 800)); 
            
            // 3. Hide rendering message, type the success message
            renderingLog.style.display = 'none';
            await typeText(successLog, "> The birthday wishes are here:", 40);
            
            // Pause before starting the letter
            await new Promise(resolve => setTimeout(resolve, 400)); 

            // 4. Loop through the letterContent array and type it line-by-line
            for (let i = 0; i < letterContent.length; i++) {
                if (letterContent[i] === "") {
                    // If it's an empty string, add a line break
                    letterBox.appendChild(document.createElement('br'));
                } else {
                    // Create a new div for the text line
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'letter-line';
                    letterBox.appendChild(lineDiv);
                    
                    // Type the line slightly faster (25ms per letter)
                    await typeText(lineDiv, letterContent[i], 25);
                }
                
                // Brief pause between lines
                await new Promise(resolve => setTimeout(resolve, 300));
            }
        });
    </script>

</body>
</html>
