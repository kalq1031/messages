<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal // Birthday Letter</title>
  <style>
    :root {
      --terminal-bg: #0d0f12;
      --terminal-top: #2b2b2b;
      --terminal-border: rgba(255, 255, 255, 0.12);
      --text: #f2f2f2;
      --muted: #8b949e;
      --green: #7ee787;
      --cyan: #79c0ff;
      --pink: #ffb3d9;
      --yellow: #f2cc60;
      --red: #ff5f57;
      --orange: #ffbd2e;
      --terminal-green: #28c840;
      --error: #ff7b72;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      color: var(--text);
      background: #1f2023;
    }

    .terminal-window {
      width: min(760px, 100%);
      max-height: min(680px, calc(100vh - 48px));
      border: 1px solid var(--terminal-border);
      border-radius: 18px;
      overflow: hidden;
      background: var(--terminal-bg);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      animation: terminalDrop 700ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .terminal-titlebar {
      height: 34px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      background: #2b2b2b;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      user-select: none;
    }

    .window-controls {
      display: flex;
      gap: 7px;
      flex: 0 0 auto;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.red { background: var(--red); }
    .dot.orange { background: var(--orange); }
    .dot.green { background: var(--terminal-green); }

    .title {
      flex: 1;
      text-align: center;
      color: #c9d1d9;
      font-size: 0.74rem;
      letter-spacing: 0.2px;
      transform: translateX(-27px);
    }

    .terminal-body {
      position: relative;
      height: min(620px, calc(100vh - 82px));
      padding: 22px;
      overflow-y: auto;
      line-height: 1.65;
      font-size: 0.96rem;
      letter-spacing: -0.01em;
      cursor: text;
      -webkit-overflow-scrolling: touch;
    }

    .terminal-body::before {
      content: "";
      position: sticky;
      top: -22px;
      display: block;
      height: 1px;
      margin: -22px -22px 21px;
      background: linear-gradient(90deg, transparent, rgba(126, 231, 135, 0.5), transparent);
      opacity: 0.5;
      animation: scanPulse 2.6s ease-in-out infinite;
    }

    .terminal-body::-webkit-scrollbar {
      width: 10px;
    }

    .terminal-body::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
    }

    .terminal-body::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
    }

    .line {
      min-height: 1.65em;
      white-space: pre-wrap;
      word-break: break-word;
      animation: lineIn 180ms ease-out both;
    }

    .muted { color: var(--muted); }
    .green { color: var(--green); }
    .cyan { color: var(--cyan); }
    .pink { color: var(--pink); }
    .yellow { color: var(--yellow); }
    .error { color: var(--error); }

    .prompt-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 1.65em;
      animation: lineIn 180ms ease-out both;
    }

    .prompt {
      color: var(--green);
      flex: 0 0 auto;
      text-shadow: 0 0 12px rgba(126, 231, 135, 0.24);
    }

    .typed-input {
      color: var(--text);
      min-width: 1ch;
    }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.15em;
      transform: translateY(3px);
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.35);
      animation: blink 1s step-end infinite;
    }

    .letter-card,
    .riddle-card {
      margin: 16px 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      animation: cardReveal 420ms ease-out both;
    }

    .letter-card {
      color: #e6edf3;
      line-height: 1.75;
    }

    .riddle-card {
      color: #c9d1d9;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .box-line {
      min-height: 1.55em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .box-border {
      color: #8b949e;
    }

    .box-title {
      color: var(--cyan);
    }

    .letter-line {
      min-height: 1.6em;
      margin-bottom: 10px;
    }

    .ascii-birthday {
      margin: 14px 0 10px;
      color: #c9d1d9;
      font-size: clamp(0.48rem, 1.25vw, 0.82rem);
      line-height: 1.15;
      letter-spacing: 0.03em;
      white-space: pre;
    }

    .mobile-input {
      position: fixed;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      border: 0;
      padding: 0;
      pointer-events: none;
    }

    @keyframes blink {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    @keyframes terminalDrop {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes lineIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: translateY(10px);
        filter: blur(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes scanPulse {
      0%, 100% { opacity: 0.18; }
      50% { opacity: 0.65; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .terminal-window {
        max-height: calc(100vh - 24px);
        border-radius: 14px;
      }

      .terminal-titlebar {
        height: 30px;
        padding: 0 10px;
      }

      .dot {
        width: 9px;
        height: 9px;
      }

      .title {
        text-align: left;
        transform: none;
        font-size: 0.68rem;
      }

      .terminal-body {
        height: calc(100vh - 54px);
        padding: 16px;
        font-size: 0.88rem;
      }

      .terminal-body::before {
        top: -16px;
        margin: -16px -16px 15px;
      }

      .prompt-line {
        align-items: flex-start;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <main class="terminal-window" aria-label="Birthday terminal letter">
    <header class="terminal-titlebar">
      <div class="window-controls" aria-hidden="true">
        <span class="dot red"></span>
        <span class="dot orange"></span>
        <span class="dot green"></span>
      </div>
      <div class="title">birthday-letter — zsh</div>
    </header>

    <section id="terminal" class="terminal-body" aria-live="polite" tabindex="0"></section>
    <input id="mobileInput" class="mobile-input" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" aria-label="Terminal command input" />
  </main>

  <script>
    const terminal = document.getElementById("terminal");
    const mobileInput = document.getElementById("mobileInput");

    const state = {
      input: "",
      locked: true,
      stage: "hello",
      attempts: 0,
      letterOpened: false
    };

    // Letter content is Base64-encoded so the plain text is not directly visible in the source.
    // This is playful obfuscation, not cryptographic security.
    const encodedLetter = [
      "RGVhciBbTmFtZV0s",
      "SGFwcHkgYmlydGhkYXksIHlvdSBsb3ZlbHkgaHVtYW4g4pyo",
      "SSBob3BlIHRvZGF5IGZlZWxzIHNvZnQsIHdhcm0sIGFuZCBmdWxsIG9mIHRpbnkgaGFwcHkgc3VycHJpc2VzLg==",
      "VGhhbmsgeW91IGZvciBiZWluZyBzb21lb25lIHdobyBtYWtlcyBvcmRpbmFyeSBkYXlzIGZlZWwgYSBsaXR0bGUgYnJpZ2h0ZXIu",
      "TWF5IHRoaXMgeWVhciBicmluZyB5b3UgbW9yZSBsYXVnaHRlciwgZWFzaWVyIG1vcm5pbmdzLCBjb3p5IG5pZ2h0cywgYW5kIGRyZWFtcyB0aGF0IHF1aWV0bHkgY29tZSB0cnVlLg==",
      "",
      "V2l0aCB0aGUgYmlnZ2VzdCBzbWlsZSw=",
      "W1lvdXIgTmFtZV0="
    ];

    // Riddle facts: day = 31, month = 5, age = 27, name length = 9.
    // Logic: 31 + 27 + 9 - 5 = 62.
    // Binary: 62 = 0b111110.
    const correctPasskeys = ["0b111110"];

    const retryMessages = [
      "incorrect passkey. try again — the compiler believes in you.",
      "access denied, but only softly. hint: use all four constants.",
      "segmentation fault in birthday.cute: hint -> decimal is not the final form.",
      "still corrupted. hint: day + age + name_len - month.",
      "almost there. convert the result to binary, then enter only 0b<binary>."
    ];

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function scrollToBottom() {
      terminal.scrollTop = terminal.scrollHeight;
    }

    function focusInput() {
      terminal.focus({ preventScroll: true });
      mobileInput.focus({ preventScroll: true });
    }

    function decodeLine(value) {
      if (!value) return "";

      const binary = window.atob(value);
      const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
      return new TextDecoder("utf-8").decode(bytes);
    }

    function getLetterContent() {
      return encodedLetter.map(decodeLine);
    }

    function createLine(text = "", className = "line") {
      const line = document.createElement("div");
      line.className = className;
      line.textContent = text;
      terminal.appendChild(line);
      scrollToBottom();
      return line;
    }

    async function typeInto(element, text, speed = 18) {
      for (const char of text) {
        element.textContent += char;
        scrollToBottom();
        await sleep(speed);
      }
    }

    async function typeLine(text = "", className = "line", speed = 18) {
      const line = createLine("", className);
      await typeInto(line, text, speed);
      return line;
    }

    function formatLastLogin(date = new Date()) {
      const weekdays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const pad = value => String(value).padStart(2, "0");

      return `Last login: ${weekdays[date.getDay()]} ${months[date.getMonth()]} ${date.getDate()} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())} on ttys001`;
    }

    function buildBirthdayBanner() {
      const glyphs = {
        H: ["#   #", "#   #", "#####", "#   #", "#   #"],
        A: [" ### ", "#   #", "#####", "#   #", "#   #"],
        P: ["#### ", "#   #", "#### ", "#    ", "#    "],
        Y: ["#   #", " # # ", "  #  ", "  #  ", "  #  "],
        B: ["#### ", "#   #", "#### ", "#   #", "#### "],
        I: ["#####", "  #  ", "  #  ", "  #  ", "#####"],
        R: ["#### ", "#   #", "#### ", "#  # ", "#   #"],
        T: ["#####", "  #  ", "  #  ", "  #  ", "  #  "],
        D: ["#### ", "#   #", "#   #", "#   #", "#### "],
        " ": ["     ", "     ", "     ", "     ", "     "]
      };

      const words = ["HAPPY", "BIRTHDAY"];

      return words.map(word => {
        const rows = ["", "", "", "", ""];

        for (const char of word) {
          const glyph = glyphs[char] || glyphs[" "];

          for (let row = 0; row < rows.length; row++) {
            rows[row] += glyph[row] + "  ";
          }
        }

        return rows.join("\n");
      }).join("\n\n");
    }

    async function renderBirthdayBanner() {
      await typeLine("> generating birthday banner...", "line pink", 18);
      await sleep(250);

      const banner = document.createElement("pre");
      banner.className = "ascii-birthday";
      terminal.appendChild(banner);
      scrollToBottom();

      const lines = buildBirthdayBanner().split("\n");

      for (const line of lines) {
        banner.textContent += line + "\n";
        scrollToBottom();
        await sleep(85);
      }
    }

    function appendBoxLine(parent, text = "", className = "box-line") {
      const line = document.createElement("div");
      line.className = className;
      line.textContent = text;
      parent.appendChild(line);
      scrollToBottom();
      return line;
    }

    function wrapText(text, maxWidth = 46) {
      if (!text) return [""];

      const words = text.split(" ");
      const lines = [];
      let current = "";

      for (const word of words) {
        const next = current ? `${current} ${word}` : word;

        if (next.length > maxWidth && current) {
          lines.push(current);
          current = word;
        } else {
          current = next;
        }
      }

      if (current) lines.push(current);
      return lines;
    }

    function frameLine(text = "", width = 46) {
      return `│ ${text.padEnd(width, " ")} │`;
    }

    async function typeFramedLine(parent, text, width = 46) {
      const line = appendBoxLine(parent, "│ ", "box-line");
      await typeInto(line, text, 22);
      line.textContent = frameLine(text, width);
      scrollToBottom();
    }

    function renderPrompt(label = "kalq@3105 ~ %") {
      removePrompt();

      const row = document.createElement("div");
      row.id = "activePrompt";
      row.className = "prompt-line";
      row.innerHTML = `
        <span class="prompt">${label}</span>
        <span id="typedInput" class="typed-input"></span><span class="cursor" aria-hidden="true"></span>
      `;
      terminal.appendChild(row);
      syncPromptText();
      scrollToBottom();
      focusInput();
    }

    function removePrompt() {
      const existing = document.getElementById("activePrompt");
      if (existing) existing.remove();
    }

    function syncPromptText() {
      const typedInput = document.getElementById("typedInput");
      if (typedInput) typedInput.textContent = state.input;
      mobileInput.value = state.input;
    }

    async function boot() {
      state.locked = true;
      await typeLine(formatLastLogin(), "line muted", 12);
      await sleep(220);
      await typeLine("> booting bday_msg.service", "line cyan", 16);
      await sleep(260);
      await typeLine("> say hello to start", "line green", 18);
      state.stage = "hello";
      state.locked = false;
      renderPrompt();
    }

    async function showRiddle() {
      state.stage = "passkey";
      await typeLine("> hello received", "line green", 16);
      await sleep(320);
      await typeLine("> ERROR: found corrupted content", "line error", 20);
      await sleep(280);
      await typeLine("> restore required: bday_msg.txt cannot be read", "line error", 16);
      await sleep(420);

      const card = document.createElement("pre");
      card.className = "riddle-card";
      card.textContent = [
        "╔═══ answer_this.ok ═════════════════════════════╗",
        "│ The passkey is hidden in four constants.       │",
        "│                                                │",
        "│ Start with the day you arrived,                │",
        "│ add the years you have breathed,               │",
        "│ add the letters that make your name,           │",
        "│ then subtract the month you survived.          │",
        "│                                                │",
        "│ Convert the result to binary.                  │",
        "│ Unlock format: 0b<binary>                      │",
        "╚════════════════════════════════════════════════╝"
      ].join("\n");
      terminal.appendChild(card);
      scrollToBottom();
      await sleep(300);
      await typeLine("> enter passkey to restore session", "line cyan", 16);
    }

    async function renderLetter() {
      if (state.letterOpened) {
        await typeLine("The letter is already open and glowing softly ♡", "line yellow");
        return;
      }

      state.locked = true;
      await typeLine("> passkey accepted", "line green", 18);
      await sleep(350);
      await typeLine("> binary signature matched: 0b111110", "line green", 18);
      await sleep(350);
      await typeLine("> checksum repaired", "line green", 18);
      await sleep(350);
      await renderBirthdayBanner();
      await sleep(450);
      await typeLine("> decrypting bday_msg.enc...", "line cyan", 20);
      await sleep(550);

      const card = document.createElement("div");
      card.className = "letter-card";
      terminal.appendChild(card);
      scrollToBottom();

      const frameWidth = 46;
      appendBoxLine(card, "╔═══ bday_msg.txt ═══════════════════════════════╗", "box-line box-border");
      appendBoxLine(card, frameLine("MESSAGE", frameWidth), "box-line box-title");
      appendBoxLine(card, frameLine("", frameWidth), "box-line box-border");

      const letterContent = getLetterContent();

      for (const text of letterContent) {
        if (!text) {
          appendBoxLine(card, frameLine("", frameWidth), "box-line");
          await sleep(250);
          continue;
        }

        const wrappedLines = wrapText(text, frameWidth);
        for (const wrappedLine of wrappedLines) {
          await typeFramedLine(card, wrappedLine, frameWidth);
        }
        await sleep(260);
      }

      appendBoxLine(card, "╚════════════════════════════════════════════════╝", "box-line box-border");

      await sleep(350);
      await typeLine("> Happy birthday, have a great day✨", "line green", 18);
      await sleep(300);
      await typeLine("exited 0", "line muted", 18);
      state.letterOpened = true;
    }

    async function handleHello(command) {
      if (command.toLowerCase() === "hello") {
        await showRiddle();
        return;
      }

      await typeLine(`command not found: ${command}`, "line yellow");
      await typeLine("Type hello to start.", "line muted", 8);
    }

    async function handlePasskey(command) {
      if (correctPasskeys.includes(command.trim().toLowerCase())) {
        state.stage = "done";
        await renderLetter();
        return;
      }

      const index = state.attempts % retryMessages.length;
      state.attempts += 1;
      await typeLine(`> ${retryMessages[index]}`, "line error", 14);
    }

    async function handleDone(command) {
      if (command.toLowerCase() === "clear") {
        terminal.innerHTML = "";
        state.letterOpened = false;
        state.attempts = 0;
        await typeLine("> say hello to start", "line green", 8);
        state.stage = "hello";
        return;
      }

      await typeLine("session restored. the letter is already unlocked ♡", "line green", 12);
    }

    async function handleCommand(rawCommand) {
      const command = rawCommand.trim();

      if (!command) return;

      if (command.toLowerCase() === "clear") {
        terminal.innerHTML = "";
        state.letterOpened = false;
        state.attempts = 0;
        await typeLine("> say hello to start", "line green", 8);
        state.stage = "hello";
        return;
      }

      if (state.stage === "hello") {
        await handleHello(command);
        return;
      }

      if (state.stage === "passkey") {
        await handlePasskey(command);
        return;
      }

      await handleDone(command);
    }

    async function submitCommand(command) {
      if (state.locked) return;

      state.input = "";
      syncPromptText();
      removePrompt();

      const promptLabel = state.stage === "passkey" ? "passkey:" : "kalq@3105 ~ %";
      createLine(`${promptLabel} ${command}`, "line");

      state.locked = true;
      await handleCommand(command);
      state.locked = state.stage === "done";

      if (!document.getElementById("activePrompt") && state.stage !== "done") {
        const nextPromptLabel = state.stage === "passkey" ? "passkey:" : "kalq@3105 ~ %";
        renderPrompt(nextPromptLabel);
      }
    }

    document.addEventListener("keydown", async event => {
      if (state.locked) return;

      if (event.target === mobileInput) return;

      if (event.key === "Enter") {
        event.preventDefault();
        await submitCommand(state.input);
        return;
      }

      if (event.key === "Backspace") {
        event.preventDefault();
        state.input = state.input.slice(0, -1);
        syncPromptText();
        return;
      }

      if (event.key.length === 1 && !event.metaKey && !event.ctrlKey && !event.altKey) {
        event.preventDefault();
        state.input += event.key;
        syncPromptText();
      }
    });

    mobileInput.addEventListener("input", () => {
      if (state.locked) return;
      state.input = mobileInput.value;
      syncPromptText();
    });

    mobileInput.addEventListener("keydown", async event => {
      if (state.locked) return;

      if (event.key === "Enter") {
        event.preventDefault();
        await submitCommand(state.input);
      }
    });

    terminal.addEventListener("click", () => {
      if (!state.locked) focusInput();
    });

    terminal.addEventListener("touchstart", () => {
      if (!state.locked) focusInput();
    }, { passive: true });

    boot();
  </script>
</body>
</html>
