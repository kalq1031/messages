<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal // Birthday Letter</title>
  <style>
    :root {
      --bg: #151515;
      --terminal-bg: #0d0f12;
      --terminal-top: #2b2b2b;
      --terminal-border: rgba(255, 255, 255, 0.12);
      --text: #f2f2f2;
      --muted: #8b949e;
      --green: #7ee787;
      --cyan: #79c0ff;
      --pink: #ffb3d9;
      --yellow: #f2cc60;
      --red: #ff5f57;
      --orange: #ffbd2e;
      --terminal-green: #28c840;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 179, 217, 0.16), transparent 35%),
        radial-gradient(circle at bottom right, rgba(121, 192, 255, 0.14), transparent 35%),
        linear-gradient(135deg, #111111 0%, #202124 100%);
    }

    .terminal-window {
      width: min(760px, 100%);
      min-height: 560px;
      border: 1px solid var(--terminal-border);
      border-radius: 18px;
      overflow: hidden;
      background: var(--terminal-bg);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .terminal-titlebar {
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: linear-gradient(#393939, var(--terminal-top));
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      user-select: none;
    }

    .window-controls {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.red { background: var(--red); }
    .dot.orange { background: var(--orange); }
    .dot.green { background: var(--terminal-green); }

    .title {
      flex: 1;
      text-align: center;
      color: #c9d1d9;
      font-size: 0.82rem;
      letter-spacing: 0.2px;
      transform: translateX(-30px);
    }

    .terminal-body {
      min-height: 516px;
      padding: 22px;
      overflow-y: auto;
      line-height: 1.65;
      font-size: 0.96rem;
    }

    .line {
      min-height: 1.65em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .muted { color: var(--muted); }
    .green { color: var(--green); }
    .cyan { color: var(--cyan); }
    .pink { color: var(--pink); }
    .yellow { color: var(--yellow); }

    .prompt-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 1.65em;
    }

    .prompt {
      color: var(--green);
      flex: 0 0 auto;
    }

    .typed-input {
      color: var(--text);
      min-width: 1ch;
    }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.15em;
      transform: translateY(3px);
      background: rgba(255, 255, 255, 0.85);
      animation: blink 1s step-end infinite;
    }

    .menu-card,
    .letter-card,
    .echo-card {
      margin: 16px 0;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.035);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .menu-card {
      border-left: 3px solid var(--cyan);
    }

    .letter-card {
      border-left: 3px solid var(--pink);
      color: #f1d7e6;
      line-height: 1.85;
    }

    .echo-card {
      border-left: 3px solid var(--yellow);
    }

    .option {
      color: var(--cyan);
      margin: 4px 0;
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .letter-line {
      min-height: 1.6em;
      margin-bottom: 10px;
    }

    .hidden {
      display: none;
    }

    @keyframes blink {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    @media (max-width: 520px) {
      body {
        padding: 12px;
        align-items: flex-start;
      }

      .terminal-window {
        min-height: calc(100vh - 24px);
        border-radius: 14px;
      }

      .terminal-body {
        padding: 16px;
        font-size: 0.88rem;
      }

      .title {
        text-align: left;
        transform: none;
        font-size: 0.72rem;
      }
    }
  </style>
</head>
<body>
  <main class="terminal-window" aria-label="Birthday terminal letter">
    <header class="terminal-titlebar">
      <div class="window-controls" aria-hidden="true">
        <span class="dot red"></span>
        <span class="dot orange"></span>
        <span class="dot green"></span>
      </div>
      <div class="title">birthday-letter — zsh — 80x24</div>
    </header>

    <section id="terminal" class="terminal-body" aria-live="polite"></section>
  </main>

  <script>
    const terminal = document.getElementById("terminal");

    const state = {
      mode: "booting",
      input: "",
      locked: true,
      letterOpened: false
    };

    const letterContent = [
      "Dear [Name],",
      "Happy birthday, you lovely human ✨",
      "I hope today feels soft, warm, and full of tiny happy surprises.",
      "Thank you for being someone who makes ordinary days feel a little brighter.",
      "May this year bring you more laughter, easier mornings, cozy nights, and dreams that quietly come true.",
      "",
      "With the biggest smile,",
      "[Your Name]"
    ];

    const cuteReplies = [
      "awww, message received. sending you a pocket-sized hug ♡",
      "that was adorable. terminal is blushing now >///<",
      "cute phrase detected. deploying extra sparkles ✨✨✨",
      "noted. saving this sweetness to heart_cache.txt",
      "reply: you are made of stardust and warm tea energy 🌙",
      "beep boop. emotional support terminal is proud of you ♡"
    ];

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function scrollToBottom() {
      terminal.scrollTop = terminal.scrollHeight;
    }

    function createLine(text = "", className = "line") {
      const line = document.createElement("div");
      line.className = className;
      line.textContent = text;
      terminal.appendChild(line);
      scrollToBottom();
      return line;
    }

    async function typeInto(element, text, speed = 18) {
      for (const char of text) {
        element.textContent += char;
        scrollToBottom();
        await sleep(speed);
      }
    }

    async function typeLine(text = "", className = "line", speed = 18) {
      const line = createLine("", className);
      await typeInto(line, text, speed);
      return line;
    }

    function showMenu() {
      const menu = document.createElement("div");
      menu.className = "menu-card";
      menu.innerHTML = `
        <div class="green">Birthday Terminal Menu</div>
        <div class="option">[1] proceed</div>
        <div class="option">[2] echo &lt;cute phrase&gt;</div>
        <div class="option">[3] help</div>
        <div class="hint">Type <span class="cyan">1</span> or <span class="cyan">proceed</span>, then press Enter. You can also type <span class="cyan">echo you are cute</span>.</div>
      `;
      terminal.appendChild(menu);
      scrollToBottom();
    }

    function renderPrompt() {
      removePrompt();

      const row = document.createElement("div");
      row.id = "activePrompt";
      row.className = "prompt-line";
      row.innerHTML = `
        <span class="prompt">birthday@letter ~ %</span>
        <span id="typedInput" class="typed-input"></span><span class="cursor" aria-hidden="true"></span>
      `;
      terminal.appendChild(row);
      syncPromptText();
      scrollToBottom();
    }

    function removePrompt() {
      const existing = document.getElementById("activePrompt");
      if (existing) existing.remove();
    }

    function syncPromptText() {
      const typedInput = document.getElementById("typedInput");
      if (typedInput) typedInput.textContent = state.input;
    }

    async function boot() {
      state.locked = true;
      await typeLine("Last login: today on ttys001", "line muted", 12);
      await sleep(250);
      await typeLine("> loading birthday_wishes.pkg", "line cyan", 18);
      await sleep(250);
      await typeLine("> status: ready to make someone smile", "line green", 18);
      await sleep(350);
      showMenu();
      state.mode = "menu";
      state.locked = false;
      renderPrompt();
    }

    async function runProceed() {
      if (state.letterOpened) {
        await typeLine("Letter already opened. It is still glowing softly below ♡", "line yellow");
        return;
      }

      state.locked = true;
      await typeLine("> ./read_letter.sh", "line muted", 12);
      await sleep(350);
      await typeLine("> Rendering a heartfelt message...", "line cyan", 20);
      await sleep(550);

      const card = document.createElement("div");
      card.className = "letter-card";
      terminal.appendChild(card);
      scrollToBottom();

      for (const text of letterContent) {
        if (!text) {
          card.appendChild(document.createElement("br"));
          await sleep(250);
          continue;
        }

        const line = document.createElement("div");
        line.className = "letter-line";
        card.appendChild(line);
        await typeInto(line, text, 22);
        await sleep(260);
      }

      await sleep(350);
      await typeLine("> The birthday wishes are here. Mission complete ✨", "line green", 18);
      state.letterOpened = true;
      state.locked = false;
      renderPrompt();
    }

    async function runEcho(command) {
      const phrase = command.replace(/^echo\s*/i, "").trim();

      if (!phrase) {
        await typeLine("Usage: echo <cute phrase>", "line yellow");
        return;
      }

      const reply = cuteReplies[Math.floor(Math.random() * cuteReplies.length)];
      const card = document.createElement("div");
      card.className = "echo-card";
      card.innerHTML = `
        <div><span class="muted">you said:</span> <span class="pink"></span></div>
        <div><span class="muted">terminal replied:</span> <span class="green"></span></div>
      `;
      terminal.appendChild(card);

      const spans = card.querySelectorAll("span.pink, span.green");
      await typeInto(spans[0], phrase, 18);
      await sleep(220);
      await typeInto(spans[1], reply, 18);
    }

    async function showHelp() {
      await typeLine("Available commands:", "line green");
      await typeLine("  1 / proceed          Open the birthday letter", "line muted", 8);
      await typeLine("  echo <cute phrase>   Say something cute and get a cute reply", "line muted", 8);
      await typeLine("  menu                 Show the menu again", "line muted", 8);
      await typeLine("  clear                Clear the terminal", "line muted", 8);
      await typeLine("  help                 Show this help text", "line muted", 8);
    }

    async function handleCommand(rawCommand) {
      const command = rawCommand.trim();
      const normalized = command.toLowerCase();

      if (!command) return;

      if (normalized === "1" || normalized === "proceed") {
        await runProceed();
        return;
      }

      if (normalized.startsWith("echo")) {
        await runEcho(command);
        return;
      }

      if (normalized === "2") {
        await typeLine("Try: echo you are my favorite person", "line yellow");
        return;
      }

      if (normalized === "3" || normalized === "help") {
        await showHelp();
        return;
      }

      if (normalized === "menu") {
        showMenu();
        return;
      }

      if (normalized === "clear") {
        terminal.innerHTML = "";
        showMenu();
        return;
      }

      await typeLine(`command not found: ${command}`, "line yellow");
      await typeLine("Type help to see available commands.", "line muted", 8);
    }

    document.addEventListener("keydown", async event => {
      if (state.locked) return;

      if (event.key === "Enter") {
        event.preventDefault();
        const command = state.input;
        state.input = "";

        removePrompt();
        createLine(`birthday@letter ~ % ${command}`, "line");

        state.locked = true;
        await handleCommand(command);
        state.locked = false;

        if (!document.getElementById("activePrompt")) {
          renderPrompt();
        }
        return;
      }

      if (event.key === "Backspace") {
        event.preventDefault();
        state.input = state.input.slice(0, -1);
        syncPromptText();
        return;
      }

      if (event.key.length === 1 && !event.metaKey && !event.ctrlKey && !event.altKey) {
        event.preventDefault();
        state.input += event.key;
        syncPromptText();
      }
    });

    terminal.addEventListener("click", () => {
      renderPrompt();
    });

    boot();
  </script>
</body>
</html>
